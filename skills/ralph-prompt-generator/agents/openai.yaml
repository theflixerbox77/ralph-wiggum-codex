interface:
  display_name: "Ralph Prompt Generator"
  short_description: "Optimize prompts for Ralph loop runs"
  default_prompt: "Use $ralph-prompt-generator to convert my rough coding request into an execution-ready $ralph-wiggum-codex prompt with model, reasoning effort, and loop flags."

policy:
  allow_implicit_invocation: false

dependencies:
  tools:
    - type: "mcp"
      value: "openaiDeveloperDocs"
      description: "OpenAI Docs MCP server"
      transport: "streamable_http"
      url: "https://developers.openai.com/mcp"
