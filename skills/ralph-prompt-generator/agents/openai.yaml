interface:
  display_name: "Ralph Prompt Generator"
  short_description: "Run a staged prompt-improvement workflow for Ralph prompts"
  default_prompt: "Use $ralph-prompt-generator to run a staged prompt-improvement workflow that turns my rough prompt into a saved production-ready prompt file for $ralph-wiggum-codex plus a short Ralph invocation snippet."

policy:
  allow_implicit_invocation: false

dependencies:
  tools:
    - type: "mcp"
      value: "openaiDeveloperDocs"
      description: "OpenAI Docs MCP server"
      transport: "streamable_http"
      url: "https://developers.openai.com/mcp"
